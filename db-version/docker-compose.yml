services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      target: dev
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - MONGODB_URI=mongodb://mongo:27017/factoryflow
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  mongo-data:
